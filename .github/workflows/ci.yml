name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: pass
          MYSQL_DATABASE: lineage_remastered
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      NODE_ENV: test
      PORT: 3000
      SESSION_SECRET: ci-secret-not-used-in-tests
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: lineage_remastered
      DB_USERNAME: root
      DB_PASSWORD: pass

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations (dev mode)
        run: npm run db:migrate:dev

      - name: Test & Build
        run: npm run build
