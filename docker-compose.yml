version: '3.8'

services:
  mini-lineage-remastered:
    build: .
    image: mini-lineage-remastered:latest
    container_name: mini-lineage-remastered
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SESSION_SECRET=${SESSION_SECRET}
      - NODE_ENV=production
