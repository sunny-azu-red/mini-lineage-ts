services:
  mini-lineage-remastered:
    build: .
    image: mini-lineage-remastered:latest
    container_name: mini-lineage-remastered
    restart: always
    ports:
      - "${PORT}:${PORT}" 
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - SESSION_SECRET=${SESSION_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
